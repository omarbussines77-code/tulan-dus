<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Moto Rider - Omar Aliyev</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; touch-action: none; }
        canvas { display: block; }
        .ui { position: absolute; width: 100%; top: 20px; padding: 0 20px; box-sizing: border-box; pointer-events: none; display: flex; justify-content: space-between; align-items: flex-start; }
        .author { color: #ff007b; font-size: 12px; text-shadow: 0 0 10px #ff007b; }
        .score-box { text-align: right; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        .record { font-size: 14px; color: #ff007b; opacity: 0.8; }
        
        .game-over { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 40px; border: 2px solid #ff007b; border-radius: 20px; text-align: center; color: #fff; z-index: 10; box-shadow: 0 0 50px #ff007b; }
        button { background: #00f2ff; border: none; padding: 12px 30px; font-family: 'Orbitron'; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        .new-record { color: #00f2ff; animation: blink 0.5s infinite; display: none; margin-bottom: 10px; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

        <div class="score-box">

            <div class="record">REKORD: <span id="highScore">0</span></div>
        </div>
    </div>

    <div class="game-over" id="gameOver">

        <p>Xalın: <span id="finalScore">0</span></p>
        <button onclick="location.reload()">YENİDƏN BAŞLA</button>
    </div>
