<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Moto - Omar Aliyev</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Orbitron', sans-serif; touch-action: none; }
        #gameCanvas { display: block; }
        
        /* UI */
        .ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; color: #00f2ff; pointer-events: none; z-index: 10; }
        .author { color: #ff007b; font-size: 12px; text-shadow: 0 0 5px #ff007b; }
        .score-text { font-size: 18px; text-shadow: 0 0 10px #00f2ff; }
        
        /* Menu */
        #menu { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 3px solid #00f2ff; padding: 40px; text-align: center; color: #fff; border-radius: 20px; z-index: 100; min-width: 250px; box-shadow: 0 0 40px rgba(0, 242, 255, 0.5); }
        #menu h2 { color: #ff007b; margin-top: 0; }
        button { background: #00f2ff; border: none; padding: 15px 30px; font-family: 'Orbitron'; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 20px; color: #000; font-size: 16px; -webkit-appearance: none; }
    </style>
</head>
<body>

    <div class="ui">
        <div class="author">DEVELOPER:<br>OMAR ALIYEV</div>
        <div id="scoreDisplay" class="score-text">0</div>
    </div>

    <div id="menu">
        <h2 id="msg">OYUN BİTDİ!</h2>
        <p id="stats"></p>
        <button id="retryBtn">YENİDƏN BAŞLA</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const menu = document.getElementById("menu");
        const retryBtn = document.getElementById("retryBtn");
        const scoreDisplay = document.getElementById("scoreDisplay");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let highScore = localStorage.getItem("omarRecord") || 0;
        let gameActive = true;
        let speed = 6;
        let obstacles = [];

        // Oyun xəttini (yolu) ortaya çəkirik
        const groundY = canvas.height * 0.7; 

        const moto = {
            x: 50,
            y: groundY - 40,
            w: 60,
            h: 35,
            dy: 0,
            jumpForce: -16,
            gravity: 0.9,
            grounded: false
        };

        function spawn() {
            if (!gameActive) return;
            obstacles.push({ x: canvas.width, y: groundY - 40, w: 25, h: 40 });
            setTimeout(spawn, 1200 + Math.random() * 1000);
        }

        function draw() {
            if (!gameActive) return;

            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Yol (Neon effektli)
            ctx.shadowBlur = 15; ctx.shadowColor = "#00f2ff";
            ctx.fillStyle = "#00f2ff";
            ctx.fillRect(0, groundY, canvas.width, 3);

            // Fizika
            moto.dy += moto.gravity;
            moto.y += moto.dy;

            if (moto.y > groundY - 40) {
                moto.y = groundY - 40;
                moto.dy = 0;
                moto.grounded = true;
            }

            // Moto Çəkilməsi
            ctx.strokeStyle = "#00f2ff";
            ctx.lineWidth = 3;
            ctx.strokeRect(moto.x, moto.y, moto.w, moto.h);
            ctx.shadowColor = "#ff007b"; ctx.strokeStyle = "#ff007b";
            ctx.beginPath(); ctx.arc(moto.x + 12, moto.y + 35, 10, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(moto.x + 48, moto.y + 35, 10, 0, Math.PI*2); ctx.stroke();

            // Maneələr
            obstacles.forEach((o, i) => {
                o.x -= speed;
                ctx.shadowColor = "#ff007b"; ctx.fillStyle = "#ff007b";
                ctx.fillRect(o.x, o.y, o.w, o.h);

                if (moto.x < o.x + o.w && moto.x + moto.w > o.x && moto.y < o.y + o.h && moto.y + moto.h > o.y) {
                    gameOver();
                }

                if (o.x + o.w < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreDisplay.innerText = score;
                    if(score % 5 === 0) speed += 0.5;
                }
            });

            ctx.shadowBlur = 0;
            requestAnimationFrame(draw);
        }

        function gameOver() {
            gameActive = false;
            menu.style.display = "block";
            let newRecord = "";
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("omarRecord", highScore);
                newRecord = "<br><span style='color:#00f2ff'>YENİ REKORD!</span>";
            }
            document.getElementById("stats").innerHTML = `Xal: ${score} | Rekord: ${highScore} ${newRecord}`;
        }

        // Düymə üçün həm touch həm click
        const restart = () => { window.location.reload(); };
        retryBtn.addEventListener("click", restart);
        retryBtn.addEventListener("touchstart", (e) => { e.preventDefault(); restart(); });

        function jump() {
            if (moto.grounded && gameActive) {
                moto.dy = moto.jumpForce;
                moto.grounded = false;
            }
        }

        window.addEventListener("keydown", (e) => { if(e.code === "Space") jump(); });
        window.addEventListener("touchstart", (e) => { 
            if (gameActive) { jump(); e.preventDefault(); }
        }, {passive: false});

        spawn();
        draw();
    </script>
</body>
</html>
