<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Moto - Omar Aliyev</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: sans-serif; touch-action: none; }
        #gameCanvas { display: block; background-color: #000; }
        
        /* Ekranın üzərindəki yazılar */
        .ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; color: #00f2ff; pointer-events: none; z-index: 10; }
        .author { color: #ff007b; font-weight: bold; font-size: 14px; }
        
        /* Oyun bitəndə çıxan menyu */
        #menu { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 2px solid #ff007b; padding: 30px; text-align: center; color: #fff; border-radius: 15px; z-index: 20; min-width: 200px; }
        button { background: #00f2ff; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="ui">
        <div class="author">QURUCU: OMAR ALIYEV</div>
        <div id="scoreBoard">XAL: 0 | REKORD: 0</div>
    </div>

    <div id="menu">
        <h2 id="msg" style="color: #ff007b;">OYUN BİTDİ!</h2>
        <p id="finalScoreText"></p>
        <button onclick="location.reload()">YENİDƏN BAŞLA</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const menu = document.getElementById("menu");
        const scoreBoard = document.getElementById("scoreBoard");

        // Ekran ölçüləri
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Oyun parametrləri
        let score = 0;
        let highScore = localStorage.getItem("omarHighScore") || 0;
        let gameActive = true;
        let speed = 5;
        let obstacles = [];

        // Motosiklet (Karakter)
        const moto = {
            x: 50,
            y: canvas.height - 100,
            w: 50,
            h: 30,
            dy: 0,
            jumpForce: -15,
            gravity: 0.8,
            grounded: false
        };

        function updateScore() {
            scoreBoard.innerText = `XAL: ${score} | REKORD: ${highScore}`;
        }
        updateScore();

        // Maneə yaratmaq
        function createObstacle() {
            if (!gameActive) return;
            obstacles.push({
                x: canvas.width,
                y: canvas.height - 80,
                w: 20,
                h: 30
            });
            setTimeout(createObstacle, 1500 + Math.random() * 1000);
        }

        function loop() {
            if (!gameActive) return;

            // Arxa fonu təmizlə
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Yolu çək
            ctx.fillStyle = "#00f2ff";
            ctx.fillRect(0, canvas.height - 50, canvas.width, 2);

            // Fizika
            moto.dy += moto.gravity;
            moto.y += moto.dy;

            if (moto.y > canvas.height - 80) {
                moto.y = canvas.height - 80;
                moto.dy = 0;
                moto.grounded = true;
            }

            // Motosikleti çək (Neon Kvadrat kimi - mütləq görsənsin deyə)
            ctx.strokeStyle = "#00f2ff";
            ctx.lineWidth = 3;
            ctx.strokeRect(moto.x, moto.y, moto.w, moto.h);
            
            // Təkərlər
            ctx.strokeStyle = "#ff007b";
            ctx.beginPath(); ctx.arc(moto.x + 10, moto.y + 30, 8, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(moto.x + 40, moto.y + 30, 8, 0, Math.PI*2); ctx.stroke();

            // Maneələr
            obstacles.forEach((obs, index) => {
                obs.x -= speed;
                ctx.fillStyle = "#ff007b";
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);

                // Toqquşma
                if (moto.x < obs.x + obs.w && moto.x + moto.w > obs.x && moto.y < obs.y + obs.h && moto.y + moto.h > obs.y) {
                    gameOver();
                }

                // Xal qazanmaq
                if (obs.x + obs.w < 0) {
                    obstacles.splice(index, 1);
                    score++;
                    if (score % 5 === 0) speed += 0.5;
                    updateScore();
                }
            });

            requestAnimationFrame(loop);
        }

        function gameOver() {
            gameActive = false;
            menu.style.display = "block";
            let recordMsg = "";
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("omarHighScore", highScore);
                recordMsg = "<br><span style='color:#00f2ff'>YENİ REKORD! TƏBRİKLƏR!</span>";
                document.getElementById("msg").innerText = "MÜKƏMMƏL!";
            }
            document.getElementById("finalScoreText").innerHTML = `Xalın: ${score} ${recordMsg}`;
        }

        // İdarəetmə
        function jump() {
            if (moto.grounded && gameActive) {
                moto.dy = moto.jumpForce;
                moto.grounded = false;
            }
        }

        window.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });
        window.addEventListener("touchstart", (e) => { jump(); e.preventDefault(); }, {passive: false});

        createObstacle();
        loop();
    </script>
</body>
</html>
